<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;


            font-family: sans-serif;
            width: 100%;
            height: 100vh;
            background-image: url(https://images.unsplash.com/photo-1642517358623-a59b74fbb228?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8c25vd3klMjBuaWdodHxlbnwwfHwwfHx8MA%3D%3D);
            background-repeat: no-repeat;
            background-size: cover;

        }

        #main-div {
            display: flex;
            flex-direction: row;


            justify-content: space-between;
            align-items: center;


        }

        #left-div {
            display: flex;
            flex-direction: row;
            gap: 20px;
            margin-top: 410px;
            align-items: center;
            margin-left: 150px;

        }

        #temterature {
            font-size: 80px;
            color: white;
        }


        #city-div {
            display: flex;
            flex-direction: column;

        }

        #city-name {
            font-size: 35px;
            font-weight: 400;
            color: white;
        }

        #city-div {
            display: flex;
            flex-direction: column;
        }

        #city-name,
        #info-p {
            margin: 0;
            color: white;
        }


        #cloud {
            width: 40px;
        }



        #right-div {

            display: flex;

            flex-direction: column;
            color: white;
            gap: 30px;

            background-color: green;

            height: 600px;

            padding: 40px 30px;
            width: 450px;
            width: 350px;
            height: 100vh;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
       

            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);


        }

        #weather {
            font-size: 25px;
        }





        #search-div {

            display: flex;
            width: 360px;

            flex-direction: row;

            border-bottom: 3px solid white;

            gap: 190px;




        }

        #form {
            display: flex;
            flex-direction: row;

        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 10px 0;
            width: 100%;
        }

        input::placeholder {
            color: white;
            font-size: medium
        }

        #search-img {
            width: 30px;
            height: 30px;
        }

        #weather-id {
            font-size: 25px;
        }


        .min-div {
            display: flex;
            flex-direction: row;
            gap: 260px;
            justify-content: space-between;
        }

        #btn {
            background: none;
            border: none;
            margin-left: 150px;
        }

        #btn:hover {
            border-color: white;
            background-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div id="main-div">
        <!--1-->
        <div id="left-div">
            <p id="temterature">g</p>
            <div id="city-div">
                <p id="city-name">london</p>
                <p id="info-p">-</p>
            </div>
            <img src="/day168/homework/cloud.png" id="cloud" >
        </div>


        <!--2-->
        <div id="right-div">
            <div id="search-div">
                <form id="form">


                    <input type="text" placeholder="Search Location..." name="city">

                    <button type="submit" id="btn"><img src="/day168/homework/search.png" id="search-img"></button>
                </form>


            </div>
            <p>weather details...</p>

            <div>
                <p id="weather">-</p>
                <div class="min-div">
                    <p>temp c</p>
                    <p id="temp">-</p>
                </div>
                <div class="min-div">
                    <p>temp f</p>
                    <p id="tempF">-</p>
                </div>
                <div class="min-div">
                    <p>wind</p>
                    <p id="wind-p">-</p>
                </div>
                <div class="min-div">
                    <p>name</p>
                    <p id="country">-</p>
                </div>
                <div class="min-div">
                    <p>cloud</p>
                    <p id="cloud-p">-</p>
                </div>
            </div>
        </div>
    </div>
    <script src="./hw.js">

    </script>
</body>

</html>
