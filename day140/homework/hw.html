<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneakers</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:white;
}

nav a{
margin:0 15px;
text-decoration:none;
color:gray;
}

.container{
display:flex;
justify-content:center;
align-items:center;
gap:60px;
padding:60px;
}

.product-img{
width:400px;
}

.product-img img{
width:100%;
border-radius:15px;
}

.thumbs{
display:flex;
gap:10px;
margin-top:15px;
}

.thumbs img{
width:80px;
border-radius:10px;
}

.product-info{
max-width:400px;
}

.product-info h4{
color:gray;
letter-spacing:2px;
}

.product-info h1{
font-size:32px;
}

.price{
display:flex;
align-items:center;
gap:15px;
font-size:22px;
}

.discount{
background:black;
color:white;
padding:3px 8px;
border-radius:5px;
font-size:14px;
}

.old{
color:gray;
text-decoration:line-through;
margin-top:5px;
}

.cart{
margin-top:25px;
display:flex;
gap:10px;
}

button{
background:rgb(255, 126, 31);
border:none;
padding:15px 30px;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h2>sneakers</h2>

<nav>
<a href="#">Collections</a>
<a href="#">Men</a>
<a href="#">Women</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

</header>

<div class="container">

<div class="product-img">
<img src="Screenshot 2026-03-10 145845.png" alt="shoe">

<div class="thumbs">
<img src="Screenshot 2026-03-10 145845.png">
<img src="Screenshot 2026-03-10 145845.png">
<img src="Screenshot 2026-03-10 145845.png">
<img src="Screenshot 2026-03-10 145845.png">
</div>
</div>

<div class="product-info">

<h4>SNEAKER COMPANY</h4>

<h1>Fall Limited Edition Sneakers</h1>

<p>
These low-profile sneakers are your perfect casual wear companion.
Featuring a durable rubber outer sole, they'll withstand everything the weather can offer.
</p>

<div class="price">
<strong>$125.00</strong>
<span class="discount">50%</span>
</div>

<div class="old">$250.00</div>

<div class="cart">
<button>Add to cart</button>
</div>

</div>

</div>

</body>
</html>
