<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(59, 70, 100);
        }
        .main{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        #res{
            width: 400px;
            height: 100px;
            background-color: rgb(24, 31, 50);
            border-radius: 10px;
        }
        .func{
            width: 400px;
            display: grid;
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: repeat(5, 50px);
            justify-content: center;
            background-color: rgb(37, 45, 68);
            border-radius: 10px;
            padding: 15px;
            gap: 15px;
        }
        .func div{
            background-color: rgb(234, 227, 219);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
        }
        .func div:hover{
            background-color: rgb(255, 255, 255);
        }
        .func div:active{
            transform: scale(0.9);
        }
        #del{
            background-color: rgb(162, 179, 225);
            color: white;
        }
        #reset{
            background-color: rgb(162, 179, 225);
            color: white;
            grid-column: 1/3;
            grid-row: 5/6;
        }
        #fin{
            background-color: rgb(249, 108, 91);
            color: white;
            grid-column: 3/5;
            grid-row: 5/6;

        }
        h1{
            font-size: 1.8rem;
        }
        .head{
            width: 400px;
            height: 100px;
            display: flex;
            align-items: end;
            justify-content: space-between;
            color: white;
        }
        .left{
            display: flex;
            align-items: center;
            gap: 30px;
        }
        p{
            font-size: 1rem;
        }
        .theme{
            
            width: 50px;
            height: 20px;
            display: flex;
            align-items: center;
            flex-direction: column;
            gap: 5px;
            
            
            

        }
        .theme .blc{
            width: 60px;
            height: 20px;
            padding: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border-radius: 5px;
            border-radius: 10px;
            background-color: rgb(37, 45, 68);
            
        }
        .theme button{
            width: 20px;
            height: 20px;
            border-radius: 30px;
            background-color: rgb(239, 112, 92);
        }
        .theme p{
            margin-top:-25px;
        }
    </style>
</head>
<body>
    <div class="main">

        <div class="head">
            <h1>calc</h1>
            <div class="left">
                <p>THEME</p>
                <div class="theme">
                    <p>1 2 3</p>
                <div class="blc">
                    
                    <button></button>
                </div>
                
                </div>
            </div>
            
        </div>
        <div id="res"></div>
        <div class="func">
            <div class="num">7</div>
            <div class="num">8</div>
            <div class="num">9</div>
            <div id="del">Del</div>
            <div class="num">4</div>
            <div class="num">5</div>
            <div class="num">6</div>
            <div id="plus">+</div>
            <div class="num">1</div>
            <div class="num">2</div>
            <div class="num">3</div>
            <div id="minus">-</div>
            <div id="dot">.</div>
            <div class="num">0</div>
            <div id="gayofa">/</div>
            <div id="x">x</div>
            <div id="reset">RESET</div>
            <div id="fin">=</div>
            
        
        </div>
        
    </div>
</body>
</html>
