<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .container {
            display: flex;
            gap: 10px;
            padding: 20px;
        }

        input {
            width: 250px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .output {
            margin-top: 20px;
            padding: 20px;
            
        }

        .item {
            background: #f1f1f1;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <input id="myInput" type="text" placeholder="შეიყვანე ტექსტი">
        <button id="myButton">click</button>
    </div>
    <button style="background-color: red;margin-left: 20px;" id="clr">clear</button>
    <div class="output" id="output"></div>
    <script>
        let input = document.getElementById("myInput");
        let cl = document.getElementById("clr");
        let btn = document.getElementById("myButton");
        let output = document.getElementById("output");
        btn.addEventListener("click", function(){
            let div = document.createElement("div");
            div.textContent = input.value;
            div.className = "item";
            output.appendChild(div);
        });
        cl.addEventListener("click", function(){
            output.textContent = "";
        });
    </script>
</body>
</html>
