<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real-time Character Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f17363; 
        font-family: 'Baloo 2', cursive;
    }

    .card {
        background-color: #e9a3aa;
        padding: 30px;
        width: 500px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .card h2 {
        margin: 0 0 20px 0;
        font-weight: 600;
        font-size: 28px;
        color: #000;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 15px;
        font-size: 16px;
        border: 2px solid #bdbdbd;
        border-radius: 5px;
        resize: none;
        outline: none;
        background-color: #e5e5e5;
        font-family: inherit;
    }

    .counter {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
        font-size: 18px;
    }

    .counter span {
        font-weight: 600;
    }

    .total {
        color: #3b82f6; 
    }

    .remaining {
        color: #ff3b30;
    }
</style>
</head>
<body>

<div class="card">
    <h2>Real-time Character Counter</h2>
    <textarea placeholder="Please write your text here..."></textarea>
    <div class="counter">
        <div>Total Characters: <span class="total">0</span></div>
        <div>Remaining: <span class="remaining">50</span></div>
    </div>
</div>

</body>
</html>
