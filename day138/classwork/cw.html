<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--შექმენი ცვლადი სადაც შეინახავთ რაიმე რიცხვს

შენი დავალებაა შეამოწმო 

თუ ეს რიცხვი არის ლუწი და არის დადებითი -> დააკონსოლლოგე "positive and even" 

სხვა შემთხვევაში დააკონსოლლოგე -> "negative and odd"

გამოიყენე ternary operators-->
    <script>
        let num = 10;
        num % 2 === 0 && num > 0 ? console.log("positive and even") : console.log("negative and odd")

    </script>
</body>
</html>
